<section id="contacto" class="section-py">
  <div class="container">
    <h2 class="section-title text-center mb-2">Contáctanos</h2>
    <p class="text-center text-muted mb-4">
      ¿Quieres ser voluntario, aliado o tienes alguna pregunta? Escríbenos.
    </p>

    <div class="row justify-content-center">
      <div class="col-lg-8">

        <form
          name="contacto-isisrico"
          method="POST"
          action="/"
          data-netlify="true"
          netlify-honeypot="bot-field"
          class="contact-form bg-light p-4 rounded-3 shadow-sm"
        >
          <input type="hidden" name="form-name" value="contacto-isisrico">
          
          <p class="d-none">
            <label>No llenar si eres humano: <input name="bot-field"></label>
          </p>

          <div class="mb-3">
            <label class="form-label">Nombre *</label>
            <input type="text" class="form-control" name="nombre" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" name="email" required>
          </div>

          <div class="mb-3">
            <label class="form-label">¿Cómo deseas participar? *</label>
            <select class="form-select" name="tipo_participacion" required>
              <option value="">Selecciona una opción</option>
              <option value="Voluntario">Voluntario</option>
              <option value="Aliado">Aliado</option>
              <option value="Donante">Donante</option>
              <option value="Información general">Información general</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Mensaje *</label>
            <textarea class="form-control" name="mensaje" rows="4" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Enviar mensaje
          </button>

        </form>

      </div>
    </div>
  </div>
</section>
