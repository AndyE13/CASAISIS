<!doctype html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aliados | Casa Isis</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
<link rel="stylesheet" href="assets/css/base.css" /><link rel="stylesheet" href="assets/css/components.css" /><link rel="stylesheet" href="assets/css/pages.css" /></head>
<body data-page="aliados.html"><header id="site-navbar"></header>
<main class="container page-header"><p class="kicker">Empresas y aliados</p><h1>Multipliquemos impacto social desde la colaboración.</h1>
<div class="cta-band my-4"><h2 class="h4">Formas de alianza</h2><p class="mb-0">Patrocinios, voluntariado corporativo, donación de recursos y cocreación de proyectos de alto impacto.</p></div>
<form class="form-card p-4 bg-white" name="aliados" method="POST" data-netlify="true" netlify-honeypot="bot-field"><input type="hidden" name="form-name" value="aliados" /><p class="d-none"><label>No llenar: <input name="bot-field" /></label></p>
<div class="row g-3"><div class="col-md-6"><label class="form-label" for="empresa">Empresa/organización</label><input id="empresa" name="empresa" class="form-control" required /></div>
<div class="col-md-6"><label class="form-label" for="contacto">Persona de contacto</label><input id="contacto" name="contacto" class="form-control" required /></div>
<div class="col-md-6"><label class="form-label" for="email">Correo</label><input id="email" type="email" name="email" class="form-control" required /></div>
<div class="col-md-6"><label class="form-label" for="tipo">Tipo de aporte</label><select id="tipo" name="tipo" class="form-select" required><option value="">Selecciona una opción</option><option>Patrocinio económico</option><option>Voluntariado corporativo</option><option>Donación en especie</option><option>Proyecto conjunto</option></select></div>
<div class="col-12"><label class="form-label" for="detalle">Cuéntanos tu propuesta</label><textarea id="detalle" name="detalle" class="form-control" rows="4" required></textarea></div>
<div class="col-12"><button type="submit" class="btn btn-brand">Enviar propuesta</button></div></div></form>
</main><div id="site-footer"></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script><script src="assets/js/site.js"></script></body></html>
